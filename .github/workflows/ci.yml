# Shipmate CI — the FREE checks (no model, no AI Gateway cost). Runs on every push.
# The eval tier (which spends AI Gateway credit) lives in evals.yml and only runs
# when the agent or evals change.
name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run build # eve build (compile + discovery diagnostics)
      - run: npm run typecheck # tsc
